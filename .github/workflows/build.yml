name: Build Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PYTHONOPTIMIZE: 1

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Free disk space
        shell: pwsh
        run: |
          Remove-Item -Recurse -Force "C:\Program Files\dotnet" -ErrorAction SilentlyContinue
          Remove-Item -Recurse -Force "C:\Program Files\Microsoft SQL Server" -ErrorAction SilentlyContinue
          Remove-Item -Recurse -Force "C:\Program Files (x86)\Microsoft SDKs" -ErrorAction SilentlyContinue
          Remove-Item -Recurse -Force "C:\Android" -ErrorAction SilentlyContinue
          Remove-Item -Recurse -Force "$env:USERPROFILE\.nuget" -ErrorAction SilentlyContinue

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Poetry
        run: pip install --no-cache-dir poetry

      - name: Install dependencies
        run: |
          poetry config virtualenvs.create false
          poetry install --no-interaction

      - name: DESTROY FAT PYTORCH AND FORCE CPU (CRITICAL FOR SIZE)
        run: pip install torch --index-url https://download.pytorch.org/whl/cpu --force-reinstall --no-cache-dir

      - name: Install PyInstaller
        run: pip install --no-cache-dir pyinstaller

      - name: Build Windows exe
        run: pyinstaller astraios.spec --clean --noconfirm

      - name: Zip dist folder
        shell: pwsh
        run: Compress-Archive -Path dist\Astraios -DestinationPath Astraios-windows-x64.zip

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: Astraios-windows-x64.zip

  build-linux:
    runs-on: ubuntu-22.04
    env:
      APPIMAGE_EXTRACT_AND_RUN: 1
    steps:
      - uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
            /usr/local/share/boost /usr/lib/jvm /opt/hostedtoolcache/CodeQL \
            /usr/share/swift /usr/local/.ghcup
          sudo docker image prune -af || true
          df -h

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libgl1 libglib2.0-0 libxcb-xinerama0 libxkbcommon-x11-0 \
            libxcb-icccm4 libxcb-image0 libxcb-keysyms1 libxcb-randr0 \
            libxcb-render-util0 libxcb-shape0 fuse libopenblas-dev

      - name: Install Poetry
        run: pip install --no-cache-dir poetry

      - name: Install dependencies
        run: |
          poetry config virtualenvs.create false
          poetry install --no-interaction

      - name: DESTROY FAT PYTORCH AND FORCE CPU (CRITICAL FOR SIZE)
        run: pip install torch --index-url https://download.pytorch.org/whl/cpu --force-reinstall --no-cache-dir

      - name: Install PyInstaller and PyQt6
        run: pip install --no-cache-dir pyinstaller PyQt6

      - name: Build Linux binary
        run: pyinstaller astraios.spec --clean --noconfirm

      - name: Create AppImage
        run: |
          wget -q https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool-x86_64.AppImage
          mkdir -p AppDir/usr/bin
          cp -r dist/Astraios/* AppDir/usr/bin/
          cp astraios/resources/icons/*.png AppDir/astraios.png 2>/dev/null || touch AppDir/astraios.png
          printf '[Desktop Entry]\nName=Astraios\nExec=Astraios\nIcon=astraios\nType=Application\nCategories=Graphics;\n' > AppDir/astraios.desktop
          printf '#!/bin/bash\nHERE="$(dirname "$(readlink -f "${0}")")"\nexec "${HERE}/usr/bin/Astraios" "$@"\n' > AppDir/AppRun
          chmod +x AppDir/AppRun
          ARCH=x86_64 ./appimagetool-x86_64.AppImage --no-appstream AppDir Astraios-x86_64.AppImage

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: Astraios-x86_64.AppImage
