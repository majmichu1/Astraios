name: Build Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:        # manual trigger for iterating on the installer

permissions:
  contents: write

env:
  PYTHONOPTIMIZE: 1

jobs:
  # ------------------------------------------------------------------ #
  #  Windows — smart installer                                         #
  #  Ships tiny (app wheel + uv). bootstrap.ps1 detects the GPU and    #
  #  downloads the matching CUDA/CPU PyTorch on the user's machine, so #
  #  there's no 2 GB asset limit and the GPU build actually works.     #
  # ------------------------------------------------------------------ #
  build-windows-installer:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build the Astraios wheel
        run: |
          pip install --no-cache-dir poetry
          poetry build --format wheel

      - name: Determine version
        id: ver
        shell: pwsh
        run: |
          if ($env:GITHUB_REF -like 'refs/tags/v*') {
            $v = $env:GITHUB_REF -replace 'refs/tags/v',''
          } else {
            $v = (python -c "import tomllib;print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          }
          echo "version=$v" >> $env:GITHUB_OUTPUT
          echo "Version: $v"

      - name: Download uv (standalone Python installer)
        shell: pwsh
        run: |
          $url = "https://github.com/astral-sh/uv/releases/latest/download/uv-x86_64-pc-windows-msvc.zip"
          Invoke-WebRequest -Uri $url -OutFile uv.zip
          Expand-Archive -Path uv.zip -DestinationPath uv_extract -Force
          Copy-Item uv_extract\uv.exe packaging\windows\uv.exe -Force

      - name: Stage the wheel next to the installer script
        shell: pwsh
        run: Copy-Item dist\*.whl packaging\windows\ -Force

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Compile the installer
        shell: pwsh
        run: |
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          & $iscc "/DMyAppVersion=${{ steps.ver.outputs.version }}" packaging\windows\astraios.iss
          Get-ChildItem packaging\windows\installer_output

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: Astraios-Windows-Installer
          path: packaging/windows/installer_output/*.exe

      - name: Upload to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: packaging/windows/installer_output/*.exe

  # ------------------------------------------------------------------ #
  #  Linux — CPU AppImage (GPU smart-install is a later follow-up)     #
  # ------------------------------------------------------------------ #
  build-linux:
    runs-on: ubuntu-22.04
    env:
      APPIMAGE_EXTRACT_AND_RUN: 1
    steps:
      - uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
            /usr/local/share/boost /usr/lib/jvm /opt/hostedtoolcache/CodeQL \
            /usr/share/swift /usr/local/.ghcup
          sudo docker image prune -af || true
          df -h

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libgl1 libglib2.0-0 libxcb-xinerama0 libxkbcommon-x11-0 \
            libxcb-icccm4 libxcb-image0 libxcb-keysyms1 libxcb-randr0 \
            libxcb-render-util0 libxcb-shape0 fuse libopenblas-dev

      - name: Install Poetry
        run: pip install --no-cache-dir poetry

      - name: Install dependencies
        run: |
          poetry config virtualenvs.create false
          poetry install --no-interaction

      - name: Force CPU PyTorch (small AppImage)
        run: pip install torch --index-url https://download.pytorch.org/whl/cpu --force-reinstall --no-cache-dir

      - name: Install PyInstaller and PyQt6
        run: pip install --no-cache-dir pyinstaller PyQt6

      - name: Build Linux binary
        run: pyinstaller astraios.spec --clean --noconfirm

      - name: Create AppImage
        run: |
          wget -q https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool-x86_64.AppImage
          mkdir -p AppDir/usr/bin
          cp -r dist/Astraios/* AppDir/usr/bin/
          cp astraios/resources/icons/*.png AppDir/astraios.png 2>/dev/null || touch AppDir/astraios.png
          printf '[Desktop Entry]\nName=Astraios\nExec=Astraios\nIcon=astraios\nType=Application\nCategories=Graphics;\n' > AppDir/astraios.desktop
          printf '#!/bin/bash\nHERE="$(dirname "$(readlink -f "${0}")")"\nexec "${HERE}/usr/bin/Astraios" "$@"\n' > AppDir/AppRun
          chmod +x AppDir/AppRun
          ARCH=x86_64 ./appimagetool-x86_64.AppImage --no-appstream AppDir Astraios-x86_64.AppImage

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: Astraios-Linux-AppImage
          path: Astraios-x86_64.AppImage

      - name: Upload to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: Astraios-x86_64.AppImage
