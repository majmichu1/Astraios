name: Build Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:        # manual trigger for iterating on the installer

permissions:
  contents: write

env:
  PYTHONOPTIMIZE: 1

jobs:
  # ------------------------------------------------------------------ #
  #  Windows — smart installer                                         #
  #  Ships tiny (app wheel + uv). bootstrap.ps1 detects the GPU and    #
  #  downloads the matching CUDA/CPU PyTorch on the user's machine, so #
  #  there's no 2 GB asset limit and the GPU build actually works.     #
  # ------------------------------------------------------------------ #
  build-windows-installer:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build the Astraios wheel
        run: |
          pip install --no-cache-dir poetry
          poetry build --format wheel

      - name: Determine version
        id: ver
        shell: pwsh
        run: |
          if ($env:GITHUB_REF -like 'refs/tags/v*') {
            $v = $env:GITHUB_REF -replace 'refs/tags/v',''
          } else {
            $v = (python -c "import tomllib;print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          }
          echo "version=$v" >> $env:GITHUB_OUTPUT
          echo "Version: $v"

      - name: Download uv (standalone Python installer)
        shell: pwsh
        run: |
          $url = "https://github.com/astral-sh/uv/releases/latest/download/uv-x86_64-pc-windows-msvc.zip"
          Invoke-WebRequest -Uri $url -OutFile uv.zip
          Expand-Archive -Path uv.zip -DestinationPath uv_extract -Force
          Copy-Item uv_extract\uv.exe packaging\windows\uv.exe -Force

      - name: Stage the wheel next to the installer script
        shell: pwsh
        run: Copy-Item dist\*.whl packaging\windows\ -Force

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Compile the installer
        shell: pwsh
        run: |
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          & $iscc "/DMyAppVersion=${{ steps.ver.outputs.version }}" packaging\windows\astraios.iss
          Get-ChildItem packaging\windows\installer_output

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: Astraios-Windows-Installer
          path: packaging/windows/installer_output/*.exe

      - name: Upload to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: packaging/windows/installer_output/*.exe

  # ------------------------------------------------------------------ #
  #  Linux — smart installer (GPU, like Windows)                       #
  #  Ships the tiny install-astraios.sh + the wheel it downloads. The  #
  #  script detects the GPU and installs CUDA/CPU PyTorch on the user's #
  #  machine. No more frozen CPU-only AppImage. The wheel is also the   #
  #  asset the script fetches from the release.                        #
  # ------------------------------------------------------------------ #
  publish-linux-installer:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build the wheel
        run: |
          pip install --no-cache-dir poetry
          poetry build --format wheel

      - name: Collect release files
        run: |
          mkdir -p out
          cp packaging/linux/install-astraios.sh out/
          cp dist/*.whl out/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Astraios-Linux-Installer
          path: out/*

      - name: Upload to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            packaging/linux/install-astraios.sh
            dist/*.whl

  # ------------------------------------------------------------------ #
  #  Linux — AppImage (portable single file, GPU capable)              #
  #  Bundles Python + Qt + the science stack (~290 MB). PyTorch is not #
  #  bundled: a CUDA build alone is ~1.8 GB, over GitHub's 2 GiB asset #
  #  limit. AppRun provisions the matching CUDA/CPU PyTorch into a     #
  #  per-user dir on first launch, so the AppImage really does run on  #
  #  the GPU while staying a small download that needs no root — which #
  #  matters on immutable distros (Bazzite, Silverblue).               #
  # ------------------------------------------------------------------ #
  build-appimage:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install FUSE (appimagetool runtime)
        run: sudo apt-get update && sudo apt-get install -y libfuse2

      - name: Determine version
        id: ver
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            v="${GITHUB_REF#refs/tags/v}"
          else
            v=$(python -c "import tomllib;print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          fi
          echo "version=$v" >> "$GITHUB_OUTPUT"
          echo "Version: $v"

      - name: Build the AppImage
        run: bash packaging/linux/appimage/build-appimage.sh "${{ steps.ver.outputs.version }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Astraios-AppImage
          path: dist/*.AppImage

      - name: Upload to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.AppImage
